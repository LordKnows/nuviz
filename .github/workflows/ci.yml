name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev,images,yaml]"

      - name: Lint with ruff
        working-directory: python
        run: ruff check src/ tests/

      - name: Type check with mypy
        working-directory: python
        run: mypy src/nuviz/ --ignore-missing-imports

      - name: Run tests with coverage
        working-directory: python
        run: pytest tests/ --cov=nuviz --cov-report=term-missing --cov-fail-under=80

  rust:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}

      - name: Check formatting
        working-directory: cli
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: cli
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: cli
        run: cargo build

      - name: Run unit tests
        working-directory: cli
        run: cargo test --lib

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python, rust]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        working-directory: python
        run: pip install -e ".[dev,images,yaml]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}

      - name: Run integration tests
        working-directory: cli
        run: cargo test --test integration_test --test hardening_test
